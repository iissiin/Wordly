name: wordly
description: Wordly — интервальное повторение слов
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.3

  # Google Sign-In
  google_sign_in: ^6.2.1

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  timezone: ^0.9.4

  # DI
  get_it: ^8.0.2

  # Navigation
  go_router: ^14.3.0

  # Utils
  equatable: ^2.0.5
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.2

  # UI
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/